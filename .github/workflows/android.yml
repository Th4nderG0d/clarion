name: Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @clarionhq/recorder (Android library)
        working-directory: example/android
        run: ./gradlew :clarionhq_recorder:assembleDebug

      - name: Build @clarionhq/recognizer (Android library)
        working-directory: example/android
        run: ./gradlew :clarionhq_recognizer:assembleDebug

      - name: Assemble example app
        working-directory: example/android
        run: ./gradlew :app:assembleDebug
